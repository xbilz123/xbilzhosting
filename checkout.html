<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - KuPanel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        *{font-family:'Segoe UI',sans-serif}body{background:linear-gradient(135deg,#0f0f23,#1a0033,#2d1b69);color:#fff}.glass{background:hsla(0,0%,100%,.1);backdrop-filter:blur(20px);border:1px solid hsla(0,0%,100%,.2)}.gradient-text{background:linear-gradient(135deg,#8b5cf6,#ec4899);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
    </style>
</head>
<body>

<!-- Navbar -->
<nav class="fixed top-0 w-full z-50 glass px-6 py-4">
    <div class="max-w-6xl mx-auto flex items-center justify-between">
        <a href="index.html" class="flex items-center space-x-3">
            <div class="w-12 h-12 bg-gradient-to-r from-purple-500 to-pink-500 rounded-xl flex items-center justify-center text-xl font-bold">KP</div>
            <span class="font-bold text-xl gradient-text">KuPanel</span>
        </a>
        <a href="https://wa.me/6281234567890" class="bg-green-500 hover:bg-green-600 text-white px-6 py-2 rounded-xl font-bold transition-all">Support WA</a>
    </div>
</nav>

<div class="pt-32 pb-24 min-h-screen flex items-center justify-center">
    <div class="max-w-md w-full mx-6">
        
        <!-- Step 1: QRIS -->
        <div id="step1" class="glass rounded-3xl p-8">
            <div class="text-center mb-8">
                <div class="w-20 h-20 bg-gradient-to-r from-purple-500 to-pink-500 rounded-2xl mx-auto mb-6 flex items-center justify-center text-2xl">
                    <i class="fas fa-qrcode"></i>
                </div>
                <h2 class="text-3xl font-bold gradient-text mb-4">Bayar QRIS</h2>
                <p class="opacity-90 mb-8">Scan & bayar, panel akan aktif otomatis!</p>
            </div>
            
            <div class="w-64 h-64 bg-gradient-to-br from-gray-200 to-gray-300 rounded-2xl mx-auto mb-8 flex items-center justify-center text-4xl border-4 border-dashed border-gray-400">
                📱 Scan QRIS
            </div>
            
            <div class="text-center space-y-3 mb-10">
                <div class="text-3xl font-bold gradient-text" id="hargaCheckout">Rp 15.000</div>
                <p class="text-sm opacity-75">Panel akan muncul dalam 60 detik setelah pembayaran</p>
            </div>
            
            <button onclick="nextStep()" class="w-full bg-gradient-to-r from-emerald-500 to-teal-500 hover:from-emerald-600 hover:to-teal-600 text-white font-bold py-5 px-8 rounded-2xl shadow-xl transition-all text-lg">
                <i class="fas fa-check mr-2"></i>Sudah Bayar
            </button>
        </div>

        <!-- Step 2: Panel Data -->
        <div id="step2" class="glass rounded-3xl p-8 hidden">
            <div class="text-center mb-8">
                <div class="w-20 h-20 bg-gradient-to-r from-emerald-500 to-teal-500 rounded-2xl mx-auto mb-6 flex items-center justify-center text-3xl">
                    <i class="fas fa-check"></i>
                </div>
                <h2 class="text-3xl font-bold gradient-text mb-4">✅ Panel Siap!</h2>
                <p class="opacity-90">Data panel Pterodactyl Anda:</p>
            </div>
            
            <div class="space-y-6 mb-10">
                <div class="p-4 bg-black/20 rounded-xl">
                    <div class="flex justify-between items-center mb-2">
                        <span><i class="fas fa-globe mr-2 text-blue-400"></i>Panel URL</span>
                        <button onclick="copyUrl()" class="p-2 hover:bg-white/20 rounded-lg transition-all">
                            <i class="fas fa-copy text-sm"></i>
                        </button>
                    </div>
                    <code id="panelUrl" class="font-mono block w-full bg-black/30 px-4 py-3 rounded-lg text-lg break-all">panel.kupanel.id/abc123</code>
                </div>
                <div class="p-4 bg-black/20 rounded-xl">
                    <div class="flex justify-between items-center mb-2">
                        <span><i class="fas fa-user mr-2 text-green-400"></i>Username</span>
                        <button onclick="copyUser()" class="p-2 hover:bg-white/20 rounded-lg transition-all">
                            <i class="fas fa-copy text-sm"></i>
                        </button>
                    </div>
                    <code id="panelUser" class="font-mono block w-full bg-black/30 px-4 py-3 rounded-lg text-lg">admin</code>
                </div>
                <div class="p-4 bg-black/20 rounded-xl">
                    <div class="flex justify-between items-center mb-2">
                        <span><i class="fas fa-key mr-2 text-red-400"></i>Password</span>
                        <button onclick="copyPass()" class="p-2 hover:bg-white/20 rounded-lg transition-all">
                            <i class="fas fa-copy text-sm"></i>
                        </button>
                    </div>
                    <code id="panelPass" class="font-mono block w-full bg-black/30 px-4 py-3 rounded-lg text-lg">X7kP9mL2qW8</code>
                </div>
            </div>
            
            <button onclick="copyAll()" class="w-full bg-gradient-to-r from-purple-500 to-pink-500 hover:from-purple-600 hover:to-pink-600 text-white font-bold py-5 px-8 rounded-2xl shadow-xl transition-all text-lg mb-4">
                📋 Copy Semua Data
            </button>
            <a href="index.html" class="w-full block bg-gradient-to-r from-gray-600 to-gray-700 hover:from-gray-700 hover:to-gray-800 text-white font-bold py-4 px-8 rounded-2xl text-center shadow-xl transition-all">
                <i class="fas fa-home mr-2"></i>Beli Lagi
            </a>
        </div>
    </div>
</div>

<script>
const urlParams = new URLSearchParams(window.location.search);
const paket = urlParams.get('paket') || 'starter';
const harga = parseInt(urlParams.get('harga')) || 15000;

// Generate random panel data
const panelId = Math.random().toString(36).substr(2, 8).toUpperCase();
const randomPass = Math.random().toString(36).substr(2, 12).toUpperCase();

document.getElementById('hargaCheckout').textContent = 'Rp ' + harga.toLocaleString();
document.getElementById('panelUrl').textContent = `panel.kupanel.id/${panelId}`;
document.getElementById('panelUser').textContent = 'admin';
document.getElementById('panelPass').textContent = randomPass;

function nextStep() {
    document.getElementById('step1').classList.add('hidden');
    document.getElementById('step2').classList.remove('hidden');
}

function copyText(text) {
    navigator.clipboard.writeText(text).then(() => {
        const btn = event.target.closest('button');
        const icon = btn.querySelector('i');
        const original = icon.className;
        icon.className = 'fas fa-check text-green-400 text-sm';
        setTimeout(() => {
            icon.className = original;
        }, 1500);
    });
}

function copyUrl() { copyText(document.getElementById('panelUrl').textContent); }
function copyUser() { copyText(document.getElementById('panelUser').textContent); }
function copyPass() { copyText(document.getElementById('panelPass').textContent); }

function copyAll() {
    const text = `Panel: ${document.getElementById('panelUrl').textContent}\nUser: ${document.getElementById('panelUser').textContent}\nPass: ${document.getElementById('panelPass').textContent}`;
    navigator.clipboard.writeText(text).then(() => {
        const btn = event.target;
        btn.innerHTML = '✅ Tersalin!';
        btn.classList.add('bg-green-500');
        setTimeout(() => {
            btn.innerHTML = '📋 Copy Semua Data';
            btn.classList.remove('bg-green-500');
        }, 2000);
    });
}
</script>

</body>
</html>
