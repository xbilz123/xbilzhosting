<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Love Text</title>

<style>

body{
margin:0;
overflow:hidden;
background:radial-gradient(circle at center,#050510,#000);
font-family:Arial;
}

canvas{
display:block;
}

.big{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
color:white;
font-size:70px;
letter-spacing:10px;
white-space:nowrap;
text-shadow:
0 0 10px #fff,
0 0 20px #ff6fa5,
0 0 40px #ff6fa5,
0 0 80px #ff2a6d;
animation:glow 3s ease-in-out infinite alternate;
pointer-events:none;
}

@keyframes glow{
from{
text-shadow:
0 0 10px #fff,
0 0 20px #ff6fa5,
0 0 40px #ff6fa5;
}
to{
text-shadow:
0 0 20px #fff,
0 0 40px #ff6fa5,
0 0 80px #ff2a6d;
}
}

</style>
</head>

<body>

<canvas id="canvas"></canvas>
<div class="big">I LOVE U PIYA</div>

<script>

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let texts=[];

for(let i=0;i<100;i++){
texts.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
size:12+Math.random()*40,
speed:1+Math.random()*1.8,
opacity:0.2+Math.random()*0.7
});
}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height);

ctx.textAlign="center";
ctx.shadowColor="#ff2a6d";
ctx.shadowBlur=20;

for(let i=0;i<texts.length;i++){

let t=texts[i];

ctx.globalAlpha=t.opacity;
ctx.font=t.size+"px Arial";
ctx.fillStyle="white";

ctx.fillText("I LOVE U DINDA",t.x,t.y);

t.y -= t.speed;

if(t.y < -50){
t.y = canvas.height + 50;
t.x = Math.random()*canvas.width;
}

}

requestAnimationFrame(draw);

}

draw();

</script>

</body>
</html>
