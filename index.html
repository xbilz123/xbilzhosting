<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Love Text</title>

<style>

body{
margin:0;
overflow:hidden;
background:black;
font-family:Arial, Helvetica, sans-serif;
}

canvas{
display:block;
}

.big{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
color:white;
font-size:55px;
font-weight:300;
letter-spacing:14px;
white-space:nowrap;
text-shadow:0 0 10px #fff,0 0 30px #ff6fa5;
pointer-events:none;
}

</style>
</head>

<body>

<canvas id="canvas"></canvas>
<div class="big">I LOVE U DINDA</div>

<script>

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let texts=[];

for(let i=0;i<90;i++){

texts.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
size:8+Math.random()*18,   // lebih kecil
speed:1.2+Math.random()*1.4,
opacity:0.2+Math.random()*0.6
});

}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height);

ctx.textAlign="center";
ctx.shadowColor="#ff6fa5";
ctx.shadowBlur=12;

for(let i=0;i<texts.length;i++){

let t=texts[i];

ctx.globalAlpha=t.opacity;
ctx.font=t.size+"px Arial";
ctx.fillStyle="white";

ctx.fillText("I LOVE U DINDA",t.x,t.y);

t.y -= t.speed;

if(t.y < -50){
t.y = canvas.height + 50;
t.x = Math.random()*canvas.width;
}

}

requestAnimationFrame(draw);

}

draw();

</script>

</body>
</html>
