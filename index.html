<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Love Text Heart</title>
<style>
body{
margin:0;
background:black;
overflow:hidden;
font-family:monospace;
}
canvas{
display:block;
}
</style>
</head>
<body>

<canvas id="c"></canvas>

<script>

const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const text = "i love u piya";
let move = 0;

let points = [];

// buat titik hati sangat banyak supaya penuh
for(let t=0;t<Math.PI*2;t+=0.005){

let x = 16*Math.pow(Math.sin(t),3);
let y = 13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t);

points.push({x,y});

}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="#ff6fa5";
ctx.font="14px monospace";

for(let i=0;i<points.length;i+=12){

let p = points[(i+move)%points.length];

let px = canvas.width/2 + p.x*15;
let py = canvas.height/2 - p.y*15;

ctx.fillText(text,px,py);

}

move++;

requestAnimationFrame(draw);

}

draw();

</script>

</body>
</html>
