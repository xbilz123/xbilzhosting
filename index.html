<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Love Text</title>

<style>

body{
margin:0;
overflow:hidden;
background:black;
font-family:Arial;
}

canvas{
display:block;
}

.big{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
color:white;
font-size:70px;
letter-spacing:10px;
white-space:nowrap;
text-shadow:0 0 10px #fff, 0 0 20px #fff, 0 0 40px #ff6fa5;
pointer-events:none;
}

</style>
</head>

<body>

<canvas id="canvas"></canvas>
<div class="big">I Love U Via</div>

<script>

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let texts=[];

/* isi layar saat load */
for(let i=0;i<80;i++){

texts.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
size:12+Math.random()*35,
speed:1+Math.random()*1.5,
opacity:0.3+Math.random()*0.6
});

}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height);

ctx.textAlign="center";

/* glow effect */
ctx.shadowColor="#ff6fa5";
ctx.shadowBlur=15;

for(let i=0;i<texts.length;i++){

let t=texts[i];

ctx.globalAlpha=t.opacity;
ctx.font=t.size+"px Arial";
ctx.fillStyle="white";

ctx.fillText("I LOVE U VIA",t.x,t.y);

t.y -= t.speed;

if(t.y < -50){
t.y = canvas.height + 50;
t.x = Math.random()*canvas.width;
}

}

requestAnimationFrame(draw);

}

draw();

</script>

</body>
</html>
