<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Via</title>
    <style>
        body {
            background-color: #000;
            margin: 0;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        canvas {
            cursor: move;
        }
    </style>
</head>
<body>

<canvas id="canvas"></canvas>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    let width, height;
    const text = "I love U via ";
    let angle = 0;

    function resize() {
        width = canvas.width = window.innerWidth;
        height = canvas.height = window.innerHeight;
    }

    window.addEventListener('resize', resize);
    resize();

    function draw() {
        // Efek trail agar terlihat estetik
        ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
        ctx.fillRect(0, 0, width, height);

        ctx.font = '16px monospace';
        ctx.fillStyle = '#ffb6c1'; // Warna pink lembut

        const centerX = width / 2;
        const centerY = height / 2;
        
        // Loop untuk membuat bentuk melingkar/3D
        for (let i = 0; i < 400; i += 10) {
            const rad = i * Math.PI / 180;
            // Rumus rotasi sederhana
            const x = centerX + Math.cos(rad + angle) * (150 + Math.sin(angle * 0.5) * 50);
            const y = centerY + Math.sin(rad + angle * 2) * (100 + Math.cos(angle * 0.8) * 30);
            
            ctx.save();
            ctx.translate(x, y);
            ctx.rotate(rad + angle);
            ctx.fillText(text, 0, 0);
            ctx.restore();
        }

        angle += 0.02;
        requestAnimationFrame(draw);
    }

    draw();
</script>
</body>
</html>
