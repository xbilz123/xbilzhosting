<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Love Text Glow</title>

<style>
body{
margin:0;
background:black;
overflow:hidden;
font-family:monospace;
}

canvas{
display:block;
}
</style>

</head>
<body>

<canvas id="canvas"></canvas>

<!-- musik -->
<audio id="music" autoplay loop muted>
<source src="https://files.catbox.moe/4f8q2o.mp3" type="audio/mpeg">
</audio>

<script>

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const music = document.getElementById("music");

/* coba aktifkan suara */
window.addEventListener("load", () => {
music.muted = false;
music.play().catch(()=>{});
});

/* kalau user sentuh layar, musik pasti play */
document.addEventListener("click", () => {
music.muted = false;
music.play();
});

function resize(){
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
}

resize();
window.addEventListener("resize", resize);

const text = "i love u piya";
let offset = 0;

let heart = [];

for(let t=0; t<Math.PI*2; t+=0.01){

let x = 16*Math.pow(Math.sin(t),3);
let y = 13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t);

heart.push({x,y});

}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="#ff6fa5";
ctx.font="16px monospace";
ctx.textAlign="center";

ctx.shadowColor="#ff6fa5";
ctx.shadowBlur=10;

let centerX = canvas.width/2;
let centerY = canvas.height/2;

for(let i=0;i<heart.length;i++){

let p = heart[(i+offset)%heart.length];

let px = centerX + p.x*17;
let py = centerY - p.y*17;

if(i%10===0){
ctx.fillText(text,px,py);
}

}

offset++;

requestAnimationFrame(draw);

}

draw();

</script>

</body>
</html>
