<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Love Text</title>

<style>
body{
margin:0;
background:black;
overflow:hidden;
font-family:monospace;
}

canvas{
display:block;
}
</style>

</head>
<body>

<canvas id="canvas"></canvas>

<script>

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

function resize(){
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
}

resize();
window.addEventListener("resize", resize);

const text = "i love u piya ";
let offset = 0;

let heart = [];

for(let t=0;t<Math.PI*2;t+=0.01){

let x = 16*Math.pow(Math.sin(t),3);
let y = 13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t);

heart.push({x,y});
}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height);

/* ukuran otomatis ikut layar */
let scale = Math.min(canvas.width,canvas.height)/40;

ctx.fillStyle="#ff6fa5";
ctx.font=(scale*0.9)+"px monospace";

/* glow tipis */
ctx.shadowColor="#ff6fa5";
ctx.shadowBlur=10;

for(let i=0;i<heart.length;i++){

let p = heart[(i+offset)%heart.length];

let px = canvas.width/2 + p.x*scale;
let py = canvas.height/2 - p.y*scale;

if(i%6===0){
ctx.fillText(text,px,py);
}

}

offset++;

requestAnimationFrame(draw);
}

draw();

</script>

</body>
</html>
