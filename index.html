<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Love Floating Text</title>

<style>

body{
margin:0;
overflow:hidden;
background:black;
font-family:Arial, sans-serif;
}

/* container */
.container{
position:fixed;
width:100%;
height:100%;
overflow:hidden;
}

/* text kecil */
.text{
position:absolute;
color:white;
opacity:0.5;
white-space:nowrap;
animation:float linear infinite;
}

/* animasi smooth dari bawah */
@keyframes float{

0%{
transform:translateY(110vh) scale(0.6);
opacity:0;
}

20%{
opacity:0.4;
}

80%{
opacity:0.7;
}

100%{
transform:translateY(-20vh) scale(1.2);
opacity:0;
}

}

/* text besar di tengah */
.big{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:60px;
color:white;
letter-spacing:8px;
text-align:center;
pointer-events:none;
}

</style>
</head>

<body>

<div class="container" id="container"></div>

<div class="big">I LOVE U DINDA</div>

<script>

const container = document.getElementById("container");

function createText(){

let span = document.createElement("span");

span.className="text";
span.innerText="I LOVE U DINDA";

/* posisi random */
span.style.left=Math.random()*100+"vw";

/* ukuran random */
span.style.fontSize=(12+Math.random()*35)+"px";

/* kecepatan smooth */
span.style.animationDuration=(8+Math.random()*6)+"s";

container.appendChild(span);

/* hapus setelah animasi selesai */
setTimeout(()=>{
span.remove();
},14000);

}

/* muncul terus dari bawah */
setInterval(createText,500);

</script>

</body>
</html>
