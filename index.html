<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Love Floating Text</title>

<style>

body{
margin:0;
overflow:hidden;
background:black;
font-family:Arial, sans-serif;
}

.container{
position:absolute;
width:100%;
height:100%;
}

.text{
position:absolute;
color:white;
opacity:0.6;
white-space:nowrap;
animation:move linear infinite;
}

@keyframes move{
0%{
transform:translateY(100vh) scale(0.5);
opacity:0;
}
50%{
opacity:0.8;
}
100%{
transform:translateY(-10vh) scale(1.5);
opacity:0;
}
}

.big{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:60px;
color:white;
letter-spacing:8px;
}

</style>

</head>
<body>

<div class="container" id="container"></div>

<div class="big">I LOVE U DINDA</div>

<script>

const container = document.getElementById("container");

for(let i=0;i<40;i++){

let span = document.createElement("span");
span.className="text";
span.innerText="I LOVE U DINDA";

span.style.left=Math.random()*100+"vw";
span.style.fontSize=(10+Math.random()*30)+"px";
span.style.animationDuration=(6+Math.random()*10)+"s";

container.appendChild(span);

}

</script>

</body>
</html>
